<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060910"/>
      <stop offset="100%" style="stop-color:#0b1220"/>
    </linearGradient>
    <linearGradient id="aaveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b6509e"/>
      <stop offset="100%" style="stop-color:#2ebac6"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
    <linearGradient id="uniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff007a"/>
      <stop offset="100%" style="stop-color:#8b0043"/>
    </linearGradient>
    <linearGradient id="eoa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrWhite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrPink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b6509e"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2ebac6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="12"/>
  <g opacity="0.025" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="900" y2="80"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/><line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="400" x2="900" y2="400"/><line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="150" y1="0" x2="150" y2="560"/><line x1="300" y1="0" x2="300" y2="560"/>
    <line x1="450" y1="0" x2="450" y2="560"/><line x1="600" y1="0" x2="600" y2="560"/>
    <line x1="750" y1="0" x2="750" y2="560"/>
  </g>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#f1f5f9" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="2">⚡ Flash Loan Agent — Contract Architecture</text>
  <text x="450" y="46" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">Aave V3 · Uniswap V3 · Ethereum Mainnet · Foundry</text>
  <line x1="30" y1="54" x2="870" y2="54" stroke="#1e293b" stroke-width="0.5"/>

  <!-- ═══ EOA (You) ═══ -->
  <rect x="370" y="66" width="160" height="55" rx="8" fill="#051a0f" stroke="#10b981" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="88" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">👤 YOU (EOA)</text>
  <text x="450" y="104" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">solicitarPrestamo()</text>

  <!-- ═══ FlashLoanBot ═══ -->
  <rect x="330" y="170" width="240" height="70" rx="8" fill="#150800" stroke="#f97316" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="193" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="12" font-weight="bold">🤖 FlashLoanBot.sol</text>
  <text x="450" y="210" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="9">executeOperation() callback</text>
  <text x="450" y="226" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="8">approve(amount + premium) → repay</text>

  <!-- EOA → Bot -->
  <line x1="450" y1="121" x2="450" y2="170" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrGreen)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <text x="460" y="150" fill="#10b981" font-family="monospace" font-size="8">call</text>

  <!-- ═══ Aave V3 Pool ═══ -->
  <rect x="60" y="290" width="220" height="80" rx="8" fill="#0d0520" stroke="#b6509e" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="170" y="315" text-anchor="middle" fill="#b6509e" font-family="monospace" font-size="12" font-weight="bold">🏦 Aave V3 Pool</text>
  <text x="170" y="333" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="9">flashLoanSimple()</text>
  <text x="170" y="349" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="8">Fee: 0.09% · Mainnet</text>
  <text x="170" y="363" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="8">Reverts if not repaid</text>

  <!-- Bot → Aave (request) -->
  <path d="M370,205 Q200,205 200,290" stroke="#b6509e" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrPink)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="240" y="240" fill="#b6509e" font-family="monospace" font-size="8">POOL.flashLoanSimple()</text>

  <!-- Aave → Bot (funds) -->
  <path d="M280,310 Q360,270 370,220" stroke="#2ebac6" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrCyan)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="0.7s" repeatCount="indefinite"/>
  </path>
  <text x="260" y="268" fill="#2ebac6" font-family="monospace" font-size="8">💰 funds deposited</text>

  <!-- ═══ Arbitrage Operations ═══ -->
  <rect x="620" y="290" width="230" height="80" rx="8" fill="#150020" stroke="#ff007a" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.9;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="735" y="315" text-anchor="middle" fill="#ff007a" font-family="monospace" font-size="12" font-weight="bold">🦄 Uniswap V3</text>
  <text x="735" y="333" text-anchor="middle" fill="#fda4af" font-family="monospace" font-size="9">exactInputSingle()</text>
  <text x="735" y="349" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="8">WETH → DAI → WETH</text>
  <text x="735" y="363" text-anchor="middle" fill="#f9a8d4" font-family="monospace" font-size="8">Arbitrage swap</text>

  <!-- Bot → Uniswap -->
  <path d="M530,205 Q700,205 700,290" stroke="#ff007a" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrRed)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="590" y="240" fill="#ff007a" font-family="monospace" font-size="8">executeOperation()</text>
  <text x="600" y="252" fill="#ff007a" font-family="monospace" font-size="8">→ swap here</text>

  <!-- Uniswap → Bot (profit) -->
  <path d="M700,330 Q620,280 530,220" stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrOrange)">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <text x="620" y="275" fill="#fbbf24" font-family="monospace" font-size="8">💰 swap result</text>

  <!-- ═══ Repayment ═══ -->
  <rect x="330" y="420" width="240" height="60" rx="8" fill="#0a100a" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="445" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">✅ Repay Aave</text>
  <text x="450" y="462" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">approve(amount + 0.09%) → auto-collect</text>
  <text x="450" y="476" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">Profit stays in contract</text>

  <!-- Bot → Repay -->
  <line x1="450" y1="240" x2="450" y2="420" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.2s" repeatCount="indefinite"/>
  </line>

  <!-- ═══ ONE BLOCK constraint ═══ -->
  <rect x="30" y="490" width="840" height="42" rx="6" fill="#0a0d18" stroke="#fbbf24" stroke-width="1">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="508" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">⏱ ALL OF THIS HAPPENS INSIDE ONE BLOCK (~12 seconds on Ethereum)</text>
  <text x="450" y="524" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">If repayment fails → entire transaction REVERTS · Capital always safe</text>

  <!-- Moving particles -->
  <circle r="5" fill="#10b981" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" calcMode="linear">
      <mpath><path d="M450,121 L450,170"/></mpath>
    </animateMotion>
  </circle>
  <circle r="5" fill="#2ebac6" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="0.5s" calcMode="linear">
      <mpath><path d="M280,310 Q360,270 370,220"/></mpath>
    </animateMotion>
  </circle>
  <circle r="5" fill="#fbbf24" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1s" calcMode="linear">
      <mpath><path d="M700,330 Q620,280 530,220"/></mpath>
    </animateMotion>
  </circle>

  <!-- Footer -->
  <line x1="30" y1="544" x2="870" y2="544" stroke="#1e293b" stroke-width="0.5"/>
  <text x="50" y="556" fill="#1e3a5f" font-family="monospace" font-size="9">Aave V3 · Uniswap V3 · Foundry fork test · Ethereum Mainnet</text>
  <text x="850" y="556" text-anchor="end" fill="#1e3a5f" font-family="monospace" font-size="9">HEO-80</text>
</svg>
